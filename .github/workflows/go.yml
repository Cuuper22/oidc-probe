name: min
on: workflow_dispatch
permissions:
  id-token: write
jobs:
  go:
    runs-on: ubuntu-latest
    steps:
      - run: curl -sH "Authorization:bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" "$ACTIONS_ID_TOKEN_REQUEST_URL&audience=jfrog-buildkite"|tee /dev/stderr|jq -r .value|cut -d. -f2|base64 -d|jq .

