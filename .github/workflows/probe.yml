name: probe
on: [workflow_dispatch]
permissions:
  id-token: write
jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - run: |
          T=$(curl -sS -H "Authorization: Bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" "${ACTIONS_ID_TOKEN_REQUEST_URL}&audience=artifactory.infra.ant.dev" | jq -r .value)
          echo "OIDC token: ${#T} chars"
          R=$(curl -sS -X POST "https://artifactory.infra.ant.dev/access/api/v1/oidc/token" -H "Content-Type: application/json" -d "{\"grant_type\":\"urn:ietf:params:oauth:grant-type:token-exchange\",\"subject_token_type\":\"urn:ietf:params:oauth:token-type:id_token\",\"subject_token\":\"${T}\",\"provider_name\":\"github\"}")
          echo "Artifactory: $R"
